<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой магазин</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1 class="page-title">Наши товары</h1>
        
        <div class="products-grid" id="products-container">
            <!-- Товары будут загружаться через JavaScript -->
            <div class="loading">Загрузка товаров...</div>
        </div>
    </div>

    <script>
        // Функция для загрузки товаров с сервера
        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                
                const container = document.getElementById('products-container');
                
                if (products.length === 0) {
                    container.innerHTML = '<p class="no-products">Товары не найдены</p>';
                    return;
                }
                
                container.innerHTML = products.map(product => `
                    <div class="product-card">
                        <img src="${product.image}" alt="${product.name}" class="product-card__image">
                        <h2 class="product-card__title">${product.name}</h2>
                        <p class="product-card__description">${product.description}</p>
                        <div class="product-card__price">${product.price.toLocaleString()} ₽</div>
                        <a href="#" class="product-card__button">Купить</a>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Ошибка загрузки товаров:', error);
                document.getElementById('products-container').innerHTML = 
                    '<p class="error">Ошибка загрузки товаров</p>';
            }
        }

        // Загружаем товары при загрузке страницы
        loadProducts();
    </script>
</body>
</html>
